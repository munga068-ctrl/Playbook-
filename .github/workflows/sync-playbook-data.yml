name: Sync Framework Playbook Data

on:
  schedule:
    - cron: "0 6,22 * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Notion sync
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_TRADES_DATA_SOURCE_ID: ${{ secrets.NOTION_TRADES_DATA_SOURCE_ID }}
          NOTION_AM_FRAMEWORK_DATA_SOURCE_ID: ${{ secrets.NOTION_AM_FRAMEWORK_DATA_SOURCE_ID }}
          NOTION_PM_FRAMEWORK_DATA_SOURCE_ID: ${{ secrets.NOTION_PM_FRAMEWORK_DATA_SOURCE_ID }}
        run: python sync_notion.py

      - name: Commit updated data.json
        run: |
          git config user.name "mmtrades-sync-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "chore: sync framework playbook data [skip ci]"
          git push
