name: Sync Notion data

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:        # lets you trigger it manually from the Actions tab

permissions:
  contents: write            # needed so the workflow can push data.json back

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run sync script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_TRADES_DATA_SOURCE_ID: ${{ secrets.NOTION_TRADES_DATA_SOURCE_ID }}
          NOTION_AM_FRAMEWORK_DATA_SOURCE_ID: ${{ secrets.NOTION_AM_FRAMEWORK_DATA_SOURCE_ID }}
          NOTION_PM_FRAMEWORK_DATA_SOURCE_ID: ${{ secrets.NOTION_PM_FRAMEWORK_DATA_SOURCE_ID }}
        run: python sync_notion.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "chore: sync Notion data [skip ci]"
          git push
