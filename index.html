<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MMTrades — Framework Ledger</title>
<link rel="preload" href="data.json" as="fetch" crossorigin>
<script src="vendor/chart.umd.min.js" defer></script>
<style>
  :root{
    --bg: #0a0c0f;
    --panel: #12151a;
    --panel-2: #171b21;
    --line: #23272f;
    --ink: #e9e6de;
    --ink-dim: #8a8f98;
    --gold: #c99a4a;
    --gold-soft: rgba(201,154,74,0.14);
    --win: #4caf7d;
    --win-soft: rgba(76,175,125,0.12);
    --loss: #d0625c;
    --loss-soft: rgba(208,98,92,0.12);
  }
  html[data-theme="light"]{
    --bg: #f5f4f0;
    --panel: #ffffff;
    --panel-2: #f0efe9;
    --line: #ded9cd;
    --ink: #21201c;
    --ink-dim: #6f6b60;
    --gold: #a97a2f;
    --gold-soft: rgba(169,122,47,0.12);
    --win: #2e8a5c;
    --win-soft: rgba(46,138,92,0.1);
    --loss: #b13f39;
    --loss-soft: rgba(177,63,57,0.1);
  }
  body{ transition: background-color .2s ease, color .2s ease; }
  .card, .stat-pill, .chart-panel{ transition: background-color .2s ease, border-color .2s ease; }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,'Segoe UI',Roboto,sans-serif;
    padding:28px 24px 60px;
  }
  .wrap{max-width:1180px;margin:0 auto;}
  header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    border-bottom:1px solid var(--line);
    padding-bottom:16px;
    margin-bottom:22px;
    flex-wrap:wrap;
    gap:10px;
  }
  .brand{
    font-family:-apple-system,'Segoe UI',Roboto,sans-serif;
    font-size:26px;
    font-weight:500;
    letter-spacing:0.2px;
  }
  .brand span{color:var(--gold);}
  .meta{
    font-family:ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace;
    font-size:11.5px;
    color:var(--ink-dim);
    text-align:right;
  }
  .summary-row{
    display:flex;
    gap:14px;
    margin-bottom:26px;
    flex-wrap:wrap;
  }
  .stat-pill{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:14px 18px;
    flex:1;
    min-width:140px;
  }
  .stat-pill .label{
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:1px;
    color:var(--ink-dim);
    margin-bottom:6px;
  }
  .stat-pill .value{
    font-family:ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace;
    font-size:22px;
    font-weight:600;
  }
  .pos{color:var(--win);}
  .neg{color:var(--loss);}
  .flat{color:var(--ink-dim);}

  .section-title{
    font-family:-apple-system,'Segoe UI',Roboto,sans-serif;
    font-size:15px;
    text-transform:uppercase;
    letter-spacing:1.5px;
    color:var(--ink-dim);
    margin:34px 0 14px;
  }

  .reconcile-note{
    background:var(--gold-soft);
    border:1px solid var(--gold);
    color:var(--ink);
    font-size:12px;
    border-radius:8px;
    padding:10px 14px;
    margin:-10px 0 22px;
  }
  .reconcile-note b{color:var(--gold);}

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(270px, 1fr));
    gap:14px;
    align-items:start;
  }
  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:16px 18px 14px;
    position:relative;
    overflow:hidden;
    transition:border-color .15s ease;
    min-width:0;
    min-height:0;
  }
  .card:hover{border-color:#3a4049;}
  .card-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:10px;
  }
  .card-name{
    font-family:-apple-system,'Segoe UI',Roboto,sans-serif;
    font-size:16px;
    font-weight:500;
    line-height:1.25;
    max-width:70%;
  }
  .badge{
    font-family:ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace;
    font-size:10px;
    padding:3px 8px;
    border-radius:20px;
    letter-spacing:0.5px;
    white-space:nowrap;
  }
  .badge.win{background:var(--win-soft);color:var(--win);}
  .badge.loss{background:var(--loss-soft);color:var(--loss);}
  .badge.flat{background:rgba(138,143,152,0.16);color:var(--ink-dim);}

  .card-metrics{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    margin-top:8px;
  }
  .metric-label{font-size:10px;color:var(--ink-dim);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px;}
  .metric-value{font-family:ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace;font-size:15px;font-weight:600;}

  .card-foot{
    display:flex;
    justify-content:space-between;
    margin-top:14px;
    padding-top:10px;
    border-top:1px dashed var(--line);
    font-family:ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace;
    font-size:11px;
    color:var(--ink-dim);
  }
  .card-foot b{color:var(--ink);font-weight:600;}

  .spark{width:100%;height:100% !important;display:block;}
  .spark-wrap{position:relative;width:100%;height:64px;margin-top:10px;overflow:hidden;}

  .chart-panel{
    background:none;
    border:1px solid var(--line);
    border-radius:12px;
    padding:20px 22px;
  }
  .chart-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:6px;
  }
  .chart-head h3{
    font-family:-apple-system,'Segoe UI',Roboto,sans-serif;
    font-weight:500;
    font-size:16px;
    margin:0;
  }
  .chart-sub{font-size:11.5px;color:var(--ink-dim);margin-bottom:16px;}
  .chart-canvas-wrap{position:relative;height:480px;width:100%;}
  #mainChart{width:100% !important;height:100% !important;}

  .footer-note{
    margin-top:30px;
    font-family:ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace;
    font-size:10.5px;
    color:var(--ink-dim);
    text-align:center;
  }

  .header-right{ display:flex; align-items:center; gap:14px; }
  .theme-toggle{
    display:flex;
    align-items:center;
    gap:6px;
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--ink-dim);
    font-family:ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace;
    font-size:11px;
    padding:7px 12px;
    border-radius:20px;
    cursor:pointer;
    transition:border-color .15s ease, color .15s ease;
  }
  .theme-toggle:hover{ border-color:var(--gold); color:var(--ink); }
  .theme-toggle .icon{ font-size:13px; line-height:1; }
  .theme-toggle:disabled{ opacity:0.55; cursor:default; }
  .theme-toggle .icon.spin{ display:inline-block; animation:spin 0.8s linear infinite; }
  @keyframes spin{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">MM<span>Trades</span> — Framework Ledger</div>
    <div class="header-right">
      <div class="meta" id="metaLine">loading…</div>
      <button class="theme-toggle" id="syncBtn" type="button">
        <span class="icon" id="syncIcon">⟳</span><span id="syncLabel">Sync</span>
      </button>
      <button class="theme-toggle" id="themeToggle" type="button">
        <span class="icon" id="themeIcon">☾</span><span id="themeLabel">Dark</span>
      </button>
    </div>
  </header>

  <div class="summary-row" id="summaryRow"></div>
  <div class="reconcile-note" id="reconcileNote" style="display:none;"></div>

  <div class="section-title">Playbooks</div>
  <div class="grid" id="cardGrid"></div>

  <div class="section-title">Framework PnL in Context</div>
  <div class="chart-panel">
    <div class="chart-head">
      <h3>Cumulative P&amp;L by Framework</h3>
    </div>
    <div class="chart-sub">Running P&amp;L for each framework across every trade it appears in, plotted in trade sequence.</div>
    <div class="chart-canvas-wrap"><canvas id="mainChart"></canvas></div>
  </div>

  <div class="footer-note">Synced from Notion · data.json regenerated automatically</div>
</div>

<script>
// line/badge color driven by P&L sign: green = profitable, red = losing, gray = breakeven
function pnlBucket(net){
  if (net > 0) return 'win';
  if (net < 0) return 'loss';
  return 'flat';
}
function pnlColor(net){
  const varName = net > 0 ? '--win' : (net < 0 ? '--loss' : '--ink-dim');
  return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
}

// draws a small label at the terminal point of each framework line, in place of a legend/key
const lineEndLabelsPlugin = {
  id: 'lineEndLabels',
  afterDatasetsDraw(chart){
    const {ctx, chartArea} = chart;
    ctx.save();
    ctx.font = "10px -apple-system, 'Segoe UI', Roboto, sans-serif";
    ctx.textBaseline = 'middle';
    ctx.textAlign = 'left';
    chart.data.datasets.forEach((ds, i) => {
      if (ds._isBaseline) return;
      const meta = chart.getDatasetMeta(i);
      if (!meta || meta.hidden) return;
      const points = meta.data;
      if (!points || !points.length) return;
      let idx = points.length - 1;
      while (idx >= 0 && (ds.data[idx] === null || ds.data[idx] === undefined)) idx--;
      if (idx < 0) return;
      const pt = points[idx];
      const y = Math.max(chartArea.top + 6, Math.min(chartArea.bottom - 6, pt.y));
      ctx.fillStyle = ds.borderColor;
      ctx.fillText(ds.label, pt.x + 6, y);
    });
    ctx.restore();
  }
};

// --- theme toggle ---
const THEME_KEY = 'mmtrades-theme';
const CHART_COLORS = {
  dark:  { tick:'#8a8f98', grid:'#1c2027', legend:'#c7c9cf', tooltipBg:'#171b21', tooltipBorder:'#2a2f38' },
  light: { tick:'#6f6b60', grid:'#e4e1d8', legend:'#33362f', tooltipBg:'#ffffff', tooltipBorder:'#ded9cd' }
};
let mainChartInstance = null;

function getTheme(){
  return localStorage.getItem(THEME_KEY) ||
    (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
}

function applyTheme(theme){
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('themeIcon').textContent = theme === 'light' ? '☀' : '☾';
  document.getElementById('themeLabel').textContent = theme === 'light' ? 'Light' : 'Dark';
  localStorage.setItem(THEME_KEY, theme);

  if (mainChartInstance){
    const c = CHART_COLORS[theme];
    const ch = mainChartInstance;
    ch.options.scales.x.ticks.color = c.tick;
    ch.options.scales.y.ticks.color = c.tick;
    ch.options.plugins.tooltip.backgroundColor = c.tooltipBg;
    ch.options.plugins.tooltip.borderColor = c.tooltipBorder;
    ch.update();
  }
}

document.getElementById('themeToggle').addEventListener('click', () => {
  applyTheme(getTheme() === 'light' ? 'dark' : 'light');
});

applyTheme(getTheme());

function fmt(n){
  const s = n<0 ? '-' : '';
  return s + '$' + Math.abs(n).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
}

let sparkInstances = [];

function sparkline(canvas, series, color){
  const ctx = canvas.getContext('2d');
  const chart = new Chart(ctx, {
    type:'line',
    data:{
      labels: series.map(p=>p.date),
      datasets:[{
        data: series.map(p=>p.cum),
        borderColor: color,
        borderWidth: 1.6,
        pointRadius: 0,
        fill: true,
        backgroundColor: color + '22',
        tension: 0.25
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      animation:false,
      scales:{x:{display:false},y:{display:false}},
      plugins:{legend:{display:false},tooltip:{enabled:false}}
    }
  });
  sparkInstances.push(chart);
}

// Same "Synced <timestamp> · <n> trades" criteria drives both the header
// meta line and the sync button — both read straight off data.generated_at.
function setSyncedLine(data){
  document.getElementById('metaLine').textContent =
    'Synced ' + new Date(data.generated_at).toLocaleString() + ' · ' + data.total_trades + ' trades';
}

function destroyExistingCharts(){
  if (mainChartInstance){ mainChartInstance.destroy(); mainChartInstance = null; }
  sparkInstances.forEach(c => c.destroy());
  sparkInstances = [];
}

function loadData(){
  return fetch('data.json', { cache: 'no-store' })
    .then(r=>{
      if(!r.ok) throw new Error(`data.json request failed (HTTP ${r.status}) — is it served alongside index.html?`);
      return r.json();
    })
    .then(data=>{
      setSyncedLine(data);

      const totalPositive = data.total_pnl >= 0;

      // clear previous render before rebuilding (needed for re-sync)
      destroyExistingCharts();
      document.getElementById('cardGrid').innerHTML = '';

      if (!data.frameworks.length) {
        document.getElementById('summaryRow').innerHTML = `
          <div class="stat-pill"><div class="label">Status</div><div class="value">No trades logged yet.</div></div>
        `;
        return;
      }

      const best = data.frameworks[0];
      const worst = data.frameworks[data.frameworks.length-1];

      document.getElementById('summaryRow').innerHTML = `
        <div class="stat-pill">
          <div class="label">Net P&amp;L (account)</div>
          <div class="value ${totalPositive?'pos':'neg'}">${fmt(data.total_pnl)}</div>
        </div>
        <div class="stat-pill">
          <div class="label">Trades Logged</div>
          <div class="value">${data.total_trades}</div>
        </div>
        <div class="stat-pill">
          <div class="label">Best Framework</div>
          <div class="value pos">${best.name}</div>
        </div>
        <div class="stat-pill">
          <div class="label">Weakest Framework</div>
          <div class="value neg">${worst.name}</div>
        </div>
      `;

      // Trades tagged to more than one framework get their P&L attributed to
      // each one, so the framework cards below won't sum to the account
      // total above. Flag it plainly rather than let the two numbers quietly
      // disagree.
      const reconcileNote = document.getElementById('reconcileNote');
      if (data.multi_tagged_trades > 0) {
        reconcileNote.style.display = 'block';
        reconcileNote.innerHTML =
          `⚠ ${data.multi_tagged_trades} trade${data.multi_tagged_trades===1?'':'s'} ` +
          `tagged to more than one framework — attributed framework total ` +
          `(<b>${fmt(data.attributed_pnl_total)}</b>) won't match the account net P&amp;L above.`;
      } else {
        reconcileNote.style.display = 'none';
      }

      const grid = document.getElementById('cardGrid');
      data.frameworks.forEach((fw, i) => {
        const bucket = pnlBucket(fw.net_pnl);
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-top">
            <div class="card-name">${fw.name}</div>
            <div class="badge ${bucket}">${fw.trades} trade${fw.trades===1?'':'s'}</div>
          </div>
          <div class="card-metrics">
            <div>
              <div class="metric-label">Win Rate</div>
              <div class="metric-value">${fw.win_rate}%</div>
            </div>
            <div style="text-align:right">
              <div class="metric-label">Net P&amp;L</div>
              <div class="metric-value ${bucket==='win'?'pos':bucket==='loss'?'neg':'flat'}">${fmt(fw.net_pnl)}</div>
            </div>
          </div>
          <div class="spark-wrap"><canvas class="spark" id="spark-${i}"></canvas></div>
          <div class="card-foot">
            <span>PF <b>${fw.profit_factor === null ? '∞' : fw.profit_factor}</b></span>
            <span>Expectancy <b class="${fw.expectancy>0?'pos':fw.expectancy<0?'neg':'flat'}">${fmt(fw.expectancy)}</b></span>
            <span>Avg W/L <b>${fmt(fw.avg_win)} / ${fmt(-fw.avg_loss)}</b></span>
          </div>
        `;
        grid.appendChild(card);
      });

      // draw sparklines after DOM insert
      data.frameworks.forEach((fw, i)=>{
        const c = document.getElementById('spark-'+i);
        if (c && fw.series.length) sparkline(c, fw.series, pnlColor(fw.net_pnl));
      });

      // safety net: once the grid has fully settled into its final layout,
      // force every sparkline to recompute its size against the real
      // (now-stable) 36px spark-wrap box rather than whatever it measured
      // at creation time
      requestAnimationFrame(() => {
        sparkInstances.forEach(c => c.resize());
      });

      // main combined chart — union of dates
      const allDates = [...new Set(data.frameworks.flatMap(f=>f.series.map(p=>p.date)))].sort();
      const datasets = data.frameworks.map((fw,i)=>{
        const map = Object.fromEntries(fw.series.map(p=>[p.date,p.cum]));
        let last = null;
        const vals = allDates.map(d=>{
          if (map[d] !== undefined){ last = map[d]; return map[d]; }
          return last;
        });
        const color = pnlColor(fw.net_pnl);
        return {
          label: fw.name,
          data: vals,
          borderColor: color,
          backgroundColor: color,
          borderWidth: 1.25,
          pointRadius: 0,
          tension: 0.2,
          spanGaps: true
        };
      });

      // dashed zero-reference line, drawn behind the framework lines
      const zeroLine = {
        label: '__zero__',
        _isBaseline: true,
        data: allDates.map(()=>0),
        borderColor: '#000',
        borderWidth: 1,
        borderDash: [5,4],
        pointRadius: 0,
        tension: 0,
        spanGaps: true,
        order: -1
      };
      datasets.unshift(zeroLine);

      const cc = CHART_COLORS[getTheme()];
      mainChartInstance = new Chart(document.getElementById('mainChart').getContext('2d'), {
        type:'line',
        data:{ labels: allDates, datasets },
        plugins:[lineEndLabelsPlugin],
        options:{
          responsive:true,
          maintainAspectRatio:false,
          layout:{ padding:{ right: 150 } },
          interaction:{mode:'nearest',intersect:false},
          scales:{
            x:{ ticks:{color:cc.tick,font:{family:'ui-monospace',size:10}}, grid:{display:false} },
            y:{ ticks:{color:cc.tick,font:{family:'ui-monospace',size:10},callback:v=>'$'+v}, grid:{display:false}, grace:'8%' }
          },
          plugins:{
            legend:{ display:false },
            tooltip:{
              backgroundColor:cc.tooltipBg,
              borderColor:cc.tooltipBorder,
              borderWidth:1,
              titleFont:{family:'ui-monospace',size:11},
              bodyFont:{family:'ui-monospace',size:11},
              filter: item => item.dataset.label !== '__zero__',
              callbacks:{ label: ctx => ` ${ctx.dataset.label}: $${ctx.parsed.y.toFixed(2)}` }
            }
          }
        }
      });
    })
    .catch(err=>{
      document.getElementById('metaLine').textContent = 'sync error: ' + err.message;
      console.error(err);
      throw err;
    });
}

const syncBtn = document.getElementById('syncBtn');
const syncIcon = document.getElementById('syncIcon');
const syncLabel = document.getElementById('syncLabel');

syncBtn.addEventListener('click', () => {
  syncBtn.disabled = true;
  syncIcon.classList.add('spin');
  syncLabel.textContent = 'Syncing…';
  loadData()
    .then(() => { syncLabel.textContent = 'Synced'; })
    .catch(() => { syncLabel.textContent = 'Retry'; })
    .finally(() => {
      syncIcon.classList.remove('spin');
      syncBtn.disabled = false;
      setTimeout(() => { syncLabel.textContent = 'Sync'; }, 2000);
    });
});

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', loadData);
} else {
  loadData();
}
</script>
</body>
  </html>
