<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MMTrades — Framework Ledger</title>
<link rel="preload" href="data.json" as="fetch" crossorigin>
<script src="vendor/chart.umd.min.js" defer></script>
<style>
:root{
  --bg: #0a0c0f;
  --panel: #12151a;
  --panel-2: #171b21;
  --line: #23272f;
  --ink: #e9e6de;
  --ink-dim: #8a8f98;
  --gold: #c99a4a;
  --gold-soft: rgba(201,154,74,0.14);
  --win: #4caf7d;
  --win-soft: rgba(76,175,125,0.12);
  --loss: #d0625c;
  --loss-soft: rgba(208,98,92,0.12);
  --stale-c: #e0a83b;
}
html[data-theme="light"]{
  --bg: #ffffff;
  --panel: #ffffff;
  --panel-2: #f0efe9;
  --line: #ded9cd;
  --ink: #21201c;
  --ink-dim: #6f6b60;
  --gold: #a97a2f;
  --gold-soft: rgba(169,122,47,0.12);
  --win: #2e8a5c;
  --win-soft: rgba(46,138,92,0.1);
  --loss: #b13f39;
  --loss-soft: rgba(177,63,57,0.1);
  --stale-c: #a97a2f;
}
body{ transition: background-color .2s ease, color .2s ease; }
.card, .stat-pill, .chart-panel{ transition: background-color .2s ease, border-color .2s ease; }
*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--bg);
  color:var(--ink);
  font-family:-apple-system,'Segoe UI',Roboto,sans-serif;
  padding:28px 24px 60px;
}
.wrap{max-width:1180px;margin:0 auto;}
header{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  border-bottom:1px solid var(--line);
  padding-bottom:16px;
  margin-bottom:22px;
  flex-wrap:wrap;
  gap:10px;
}
.brand{ font-size:26px; font-weight:500; letter-spacing:0.2px; }
.brand span{color:var(--gold);}
.meta{
  font-family:ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace;
  font-size:11.5px;
  color:var(--ink-dim);
  text-align:right;
}
.meta.stale{ color:var(--stale-c); }
.meta.err{ color:var(--loss); }
.summary-row{ display:flex; gap:14px; margin-bottom:26px; flex-wrap:wrap; }
.stat-pill{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:10px;
  padding:14px 18px;
  flex:1;
  min-width:140px;
}
.stat-pill .label{ font-size:10.5px; text-transform:uppercase; letter-spacing:1px; color:var(--ink-dim); margin-bottom:6px; }
.stat-pill .value{ font-family:ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace; font-size:22px; font-weight:600; }
.pos{color:var(--win);}
.neg{color:var(--loss);}
.flat{color:var(--ink-dim);}
.section-title{
  font-size:15px;
  text-transform:uppercase;
  letter-spacing:1.5px;
  color:var(--ink-dim);
  margin:34px 0 14px;
}

/* ---------- Playbook cards (grid view, matches reference dashboard) ---------- */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));
  gap:16px;
  align-items:start;
}
.card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:14px;
  padding:18px 20px 16px;
  position:relative;
  overflow:hidden;
  cursor:default;
  transition:border-color .18s ease, box-shadow .18s ease, transform .18s ease;
}
.card:hover, .card:focus-within{
  border-color:var(--gold);
  box-shadow:0 10px 28px -12px rgba(0,0,0,0.45);
  transform:translateY(-2px);
}
.card-top{ display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:14px; }
.card-id{ display:flex; align-items:center; gap:10px; min-width:0; }
.card-icon{
  width:36px; height:36px; flex:0 0 36px;
  border-radius:9px;
  background:var(--panel-2);
  border:1px solid var(--line);
  display:flex; align-items:center; justify-content:center;
  font-size:17px;
}
.card-name-wrap{ min-width:0; }
.card-name{ font-size:15.5px; font-weight:600; line-height:1.25; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.card-sub{ font-size:11.5px; color:var(--gold); margin-top:2px; }
.badge{
  font-family:ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace;
  font-size:10px;
  color:var(--ink-dim);
  display:flex; align-items:center; gap:4px;
  white-space:nowrap;
  flex:0 0 auto;
  padding-top:2px;
}
.badge .lock{ font-size:10px; }

.card-metrics{ display:flex; align-items:center; gap:18px; margin:6px 0 4px; }
.ring{
  width:40px; height:40px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  flex:0 0 40px;
  position:relative;
}
.ring::before{
  content:"";
  position:absolute; inset:0; border-radius:50%;
  background:conic-gradient(var(--ring-color) calc(var(--pct) * 1%), var(--line) 0);
  mask:radial-gradient(farthest-side, transparent calc(100% - 4px), #000 calc(100% - 4px));
  -webkit-mask:radial-gradient(farthest-side, transparent calc(100% - 4px), #000 calc(100% - 4px));
}
.ring-label{ position:relative; z-index:1; font-size:7.5px; font-weight:600; color:var(--ink-dim); text-align:center; line-height:1.15; }
.metric-block .metric-label{ font-size:10px; color:var(--ink-dim); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
.metric-block .metric-value{ font-family:ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace; font-size:19px; font-weight:700; }
.metric-block + .metric-block{ margin-left:2px; }
.metrics-cols{ display:flex; flex-direction:column; gap:10px; }

.spark-wrap{ position:relative; width:100%; height:78px; margin-top:12px; overflow:hidden; }
.spark{ width:100%; height:100% !important; display:block; }

/* hover-revealed detail panel — collapsed by default, expands on hover/focus like the reference "Opening Drive" card */
.card-details{
  max-height:0;
  opacity:0;
  overflow:hidden;
  transition:max-height .28s ease, opacity .22s ease, margin-top .28s ease, padding-top .28s ease;
}
.card:hover .card-details, .card:focus-within .card-details{
  max-height:200px;
  opacity:1;
  margin-top:14px;
  padding-top:12px;
  border-top:1px dashed var(--line);
}
.details-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px 18px;
}
.details-grid .metric-label{ font-size:9.5px; color:var(--ink-dim); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:3px; }
.details-grid .metric-value{ font-family:ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace; font-size:14px; font-weight:600; }
.hover-hint{
  position:absolute; right:20px; bottom:14px;
  font-size:9.5px; color:var(--ink-dim); opacity:.6;
  font-style:italic;
  transition:opacity .15s ease;
}
.card:hover .hover-hint, .card:focus-within .hover-hint{ opacity:0; }

.chart-panel{ background:none; border:1px solid var(--line); border-radius:12px; padding:20px 22px; }
.chart-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.chart-head h3{ font-weight:500; font-size:16px; margin:0; }
.chart-sub{ font-size:11.5px; color:var(--ink-dim); margin-bottom:16px; }
.chart-controls{ display:flex; align-items:center; gap:12px; margin-bottom:14px; flex-wrap:wrap; }
.seg-control{ display:flex; border:1px solid var(--line); border-radius:8px; overflow:hidden; }
.seg-btn{
  background:var(--panel); border:none; border-right:1px solid var(--line);
  color:var(--ink-dim); font-family:ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace;
  font-size:11px; padding:6px 13px; cursor:pointer; transition:background-color .15s ease, color .15s ease;
}
.seg-btn:last-child{ border-right:none; }
.seg-btn:hover{ color:var(--ink); }
.seg-btn.active{ background:var(--gold-soft); color:var(--gold); }
.chip-btn{
  background:var(--panel); border:1px solid var(--line); color:var(--ink-dim);
  font-family:ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace;
  font-size:11px; padding:6px 13px; border-radius:20px; cursor:pointer;
  transition:border-color .15s ease, color .15s ease;
}
.chip-btn:hover{ border-color:var(--gold); color:var(--ink); }
.legend-pills{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
.legend-pill{
  display:flex; align-items:center; gap:6px;
  border:1px solid var(--line); border-radius:20px; padding:4px 11px 4px 8px;
  font-size:10.5px; font-family:ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace;
  color:var(--ink-dim); cursor:pointer; background:var(--panel);
  transition:opacity .15s ease, border-color .15s ease, color .15s ease;
}
.legend-pill:hover{ border-color:var(--gold); color:var(--ink); }
.legend-pill .dot{ width:8px; height:8px; border-radius:50%; flex:0 0 8px; }
.legend-pill.solo{ border-color:var(--gold); color:var(--ink); background:var(--gold-soft); }
.legend-pill.dimmed{ opacity:0.4; }
.chart-canvas-wrap{ position:relative; height:480px; width:100%; }
#mainChart{ width:100% !important; height:100% !important; }
.footer-note{ margin-top:30px; font-family:ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace; font-size:10.5px; color:var(--ink-dim); text-align:center; }
.header-right{ display:flex; align-items:center; gap:14px; }
.theme-toggle{
  display:flex; align-items:center; gap:6px;
  background:var(--panel); border:1px solid var(--line); color:var(--ink-dim);
  font-family:ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace;
  font-size:11px; padding:7px 12px; border-radius:20px; cursor:pointer;
  transition:border-color .15s ease, color .15s ease;
}
.theme-toggle:hover{ border-color:var(--gold); color:var(--ink); }
.theme-toggle .icon{ font-size:13px; line-height:1; }
.theme-toggle:disabled{ opacity:0.55; cursor:default; }
.theme-toggle .icon.spin{ display:inline-block; animation:spin 0.8s linear infinite; }
@keyframes spin{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">MM<span>Trades</span> — Framework Ledger</div>
    <div class="header-right">
      <div class="meta" id="metaLine">loading…</div>
      <button class="theme-toggle" id="syncBtn" type="button">
        <span class="icon" id="syncIcon">⟳</span><span id="syncLabel">Sync</span>
      </button>
      <button class="theme-toggle" id="themeToggle" type="button">
        <span class="icon" id="themeIcon">☾</span><span id="themeLabel">Dark</span>
      </button>
    </div>
  </header>

  <div class="summary-row" id="summaryRow"></div>

  <div class="section-title">Playbooks</div>
  <div class="grid" id="cardGrid"></div>

  <div class="section-title">Framework PnL in Context</div>
  <div class="chart-panel">
    <div class="chart-head"><h3>Cumulative P&amp;L by Framework</h3></div>
    <div class="chart-sub">Running P&amp;L for each framework across every trade it appears in, plotted in trade sequence.</div>
    <div class="chart-controls">
      <div class="seg-control" id="viewModeControl">
        <button class="seg-btn active" type="button" data-mode="all">All</button>
        <button class="seg-btn" type="button" data-mode="winners">Winners</button>
        <button class="seg-btn" type="button" data-mode="losers">Losers</button>
      </div>
      <button class="chip-btn" id="showAllBtn" type="button">Show all</button>
    </div>
    <div class="legend-pills" id="legendPills"></div>
    <div class="chart-canvas-wrap"><canvas id="mainChart"></canvas></div>
  </div>

  <div class="footer-note">Synced from Notion · data.json regenerated automatically · hover a playbook card for full stats</div>
</div>

<script>
// line/badge color driven by P&L sign: green = profitable, red = losing, gray = breakeven
function pnlBucket(net){
  if (net > 0) return 'win';
  if (net < 0) return 'loss';
  return 'flat';
}
function pnlColor(net){
  const varName = net > 0 ? '--win' : (net < 0 ? '--loss' : '--ink-dim');
  return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
}

// a small rotating set of icons so each card reads distinctly, same idea as the
// emoji glyphs on the reference dashboard (Gap and Go, No Setup, Opening Drive, ...)
const ICONS = ['🚀','⚡','🎯','🌤️','🕒','🔁','📉','📈','🧭','⏱️','🌀','🪝'];
function iconFor(name, idx){
  const n = name.toLowerCase();
  if (n.includes('no setup')) return '❌';
  if (n.includes('open')) return '🚀';
  if (n.includes('macro')) return '🔁';
  if (n.includes('lunch')) return '🍽️';
  if (n.includes('final') || n.includes('close')) return '🌙';
  if (n.includes('h4') || n.includes('4hr') || n.includes('4 hr')) return '🧭';
  return ICONS[idx % ICONS.length];
}

// shared state driving the chart's legend pills, winners/losers toggle,
// top-5 cap, and card-hover highlighting — persists across data reloads
let chartState = { soloName: null, viewMode: 'all', showAll: false, hoverName: null };
let frameworksMeta = []; // [{name, color, netPnl, absPnl, datasetIndex}], rebuilt on each load

const lineEndLabelsPlugin = {
  id: 'lineEndLabels',
  afterDatasetsDraw(chart){
    const {ctx, chartArea} = chart;
    const minGap = 13;
    const hoverName = chart.$hoverName || null;
    const items = [];
    chart.data.datasets.forEach((ds, i) => {
      if (ds._isBaseline) return;
      const meta = chart.getDatasetMeta(i);
      if (!meta || meta.hidden) return;
      const points = meta.data;
      if (!points || !points.length) return;
      let idx = points.length - 1;
      while (idx >= 0 && (ds.data[idx] === null || ds.data[idx] === undefined)) idx--;
      if (idx < 0) return;
      const pt = points[idx];
      const rawY = Math.max(chartArea.top + 6, Math.min(chartArea.bottom - 6, pt.y));
      items.push({ label: ds.label, color: ds.borderColor, x: pt.x, y: rawY });
    });
    // de-collide: sort top-to-bottom, push overlapping labels apart, then
    // pull the whole stack back inside the chart area if it ran over the bottom
    items.sort((a,b)=>a.y-b.y);
    for(let i=1;i<items.length;i++){
      if (items[i].y - items[i-1].y < minGap) items[i].y = items[i-1].y + minGap;
    }
    if (items.length){
      const overflow = items[items.length-1].y - (chartArea.bottom - 4);
      if (overflow > 0) items.forEach(it => it.y -= overflow);
    }
    ctx.save();
    ctx.textBaseline = 'middle';
    ctx.textAlign = 'left';
    items.forEach(it=>{
      const isHovered = hoverName && it.label === hoverName;
      ctx.font = isHovered
        ? "bold 10px -apple-system, 'Segoe UI', Roboto, sans-serif"
        : "10px -apple-system, 'Segoe UI', Roboto, sans-serif";
      ctx.fillStyle = it.color;
      ctx.fillText(it.label, it.x + 6, it.y);
    });
    ctx.restore();
  }
};

// --- theme toggle ---
const THEME_KEY = 'mmtrades-theme';
const CHART_COLORS = {
  dark: { tick:'#8a8f98', grid:'#1c2027', legend:'#c7c9cf', tooltipBg:'#171b21', tooltipBorder:'#2a2f38' },
  light: { tick:'#6f6b60', grid:'#e4e1d8', legend:'#33362f', tooltipBg:'#ffffff', tooltipBorder:'#ded9cd' }
};
let mainChartInstance = null;
function getTheme(){
  return localStorage.getItem(THEME_KEY) ||
    (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
}
function applyTheme(theme){
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('themeIcon').textContent = theme === 'light' ? '☀' : '☾';
  document.getElementById('themeLabel').textContent = theme === 'light' ? 'Light' : 'Dark';
  localStorage.setItem(THEME_KEY, theme);
  if (mainChartInstance){
    const c = CHART_COLORS[theme];
    const ch = mainChartInstance;
    ch.options.scales.x.ticks.color = c.tick;
    ch.options.scales.y.ticks.color = c.tick;
    ch.options.plugins.tooltip.backgroundColor = c.tooltipBg;
    ch.options.plugins.tooltip.borderColor = c.tooltipBorder;
    ch.update();
  }
}
document.getElementById('themeToggle').addEventListener('click', () => {
  applyTheme(getTheme() === 'light' ? 'dark' : 'light');
});
applyTheme(getTheme());

function fmt(n){
  const s = n<0 ? '-' : '';
  return s + '$' + Math.abs(n).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
}

let sparkInstances = [];
function sparkline(canvas, series, color){
  const ctx = canvas.getContext('2d');
  // a single-trade playbook has just one data point, and a line chart has
  // nothing to draw a line between — synthesize a flat lead-in from 0 so a
  // visible segment renders, with a dot marking the actual trade.
  const singlePoint = series.length === 1;
  const labels = singlePoint ? ['', series[0].date] : series.map(p=>p.date);
  const values = singlePoint ? [0, series[0].cum] : series.map(p=>p.cum);
  const chart = new Chart(ctx, {
    type:'line',
    data:{
      labels,
      datasets:[{
        data: values,
        borderColor: color,
        borderWidth: 1.6,
        pointRadius: singlePoint ? [0, 3] : 0,
        pointBackgroundColor: color,
        pointBorderColor: color,
        fill: true,
        backgroundColor: color + '22',
        tension: singlePoint ? 0 : 0.25
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      animation:false,
      scales:{x:{display:false},y:{display:false}},
      plugins:{legend:{display:false},tooltip:{enabled:false}}
    }
  });
  sparkInstances.push(chart);
}

const STALE_THRESHOLD_MINUTES = 20;
let lastSyncedAt = null;
let lastTradeCount = null;
const metaLineEl = document.getElementById('metaLine');
function relativeAgo(date){
  const minutesAgo = Math.max(0, Math.round((Date.now() - date.getTime()) / 60000));
  if(minutesAgo < 1) return { minutesAgo, ago: 'just now' };
  if(minutesAgo < 60) return { minutesAgo, ago: minutesAgo + ' min ago' };
  if(minutesAgo < 1440) return { minutesAgo, ago: Math.round(minutesAgo / 60) + ' hr ago' };
  return { minutesAgo, ago: Math.round(minutesAgo / 1440) + ' days ago' };
}
function renderSyncedLine(){
  if(!lastSyncedAt) return;
  const { minutesAgo, ago } = relativeAgo(lastSyncedAt);
  const isStale = minutesAgo > STALE_THRESHOLD_MINUTES;
  metaLineEl.textContent = isStale
    ? `Last synced ${ago} — this looks stale, the numbers above may be behind. Trigger the sync workflow manually to refresh.`
    : `Synced ${ago} · ${lastTradeCount} trades`;
  metaLineEl.className = 'meta' + (isStale ? ' stale' : '');
}
function setSyncedLine(data){
  lastSyncedAt = new Date(data.generated_at);
  lastTradeCount = data.total_trades;
  renderSyncedLine();
}
setInterval(renderSyncedLine, 30000);

function destroyExistingCharts(){
  if (mainChartInstance){ mainChartInstance.destroy(); mainChartInstance = null; }
  sparkInstances.forEach(c => c.destroy());
  sparkInstances = [];
}

// recomputes which framework lines are hidden, based on: an active solo
// selection (overrides everything else), the winners/losers toggle, and the
// default top-5-by-|P&L| cap (bypassed once "Show all" is clicked)
function applyVisibility(){
  if (!mainChartInstance) return;
  const chart = mainChartInstance;
  let eligible = frameworksMeta.filter(fw=>{
    if (chartState.viewMode === 'winners') return fw.netPnl > 0;
    if (chartState.viewMode === 'losers') return fw.netPnl < 0;
    return true;
  });
  eligible.sort((a,b)=> b.absPnl - a.absPnl);
  const capped = chartState.showAll ? eligible : eligible.slice(0,5);
  const visibleNames = new Set(capped.map(f=>f.name));

  frameworksMeta.forEach(fw=>{
    const meta = chart.getDatasetMeta(fw.datasetIndex);
    meta.hidden = chartState.soloName ? (fw.name !== chartState.soloName) : !visibleNames.has(fw.name);
  });
  chart.update();

  const showAllBtn = document.getElementById('showAllBtn');
  if (showAllBtn){
    if (eligible.length <= 5){
      showAllBtn.style.display = 'none';
    } else {
      showAllBtn.style.display = '';
      showAllBtn.textContent = chartState.showAll ? 'Show top 5' : `Show all (${eligible.length})`;
    }
  }
  document.querySelectorAll('#viewModeControl .seg-btn').forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.mode === chartState.viewMode);
  });
  renderLegendPills();
}

// dims every line except the one matching hoverName (driven by hovering/
// focusing a playbook card above), so the card and chart stay in sync
function applyHoverStyle(){
  if (!mainChartInstance) return;
  const chart = mainChartInstance;
  chart.$hoverName = chartState.hoverName;
  frameworksMeta.forEach(fw=>{
    const ds = chart.data.datasets[fw.datasetIndex];
    if (!ds) return;
    if (!chartState.hoverName){
      ds.borderColor = fw.color;
      ds.borderWidth = 1.25;
    } else if (fw.name === chartState.hoverName){
      ds.borderColor = fw.color;
      ds.borderWidth = 3;
    } else {
      ds.borderColor = fw.color + '30';
      ds.borderWidth = 1;
    }
  });
  chart.update('none');
}

function renderLegendPills(){
  const wrap = document.getElementById('legendPills');
  if (!wrap || !mainChartInstance) return;
  wrap.innerHTML = frameworksMeta.map(fw=>{
    const meta = mainChartInstance.getDatasetMeta(fw.datasetIndex);
    const isSolo = chartState.soloName === fw.name;
    const cls = ['legend-pill'];
    if (isSolo) cls.push('solo');
    else if (meta.hidden) cls.push('dimmed');
    return `<button type="button" class="${cls.join(' ')}" data-name="${fw.name.replace(/"/g,'&quot;')}">
      <span class="dot" style="background:${fw.color}"></span>${fw.name}
    </button>`;
  }).join('');
  wrap.querySelectorAll('.legend-pill').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const name = btn.dataset.name;
      chartState.soloName = (chartState.soloName === name) ? null : name;
      applyVisibility();
    });
  });
}

function loadData(){
  return fetch('data.json', { cache: 'no-store' })
    .then(r=>{
      if(!r.ok) throw new Error(`data.json request failed (HTTP ${r.status}) — is it served alongside index.html?`);
      return r.json();
    })
    .then(data=>{
      setSyncedLine(data);
      const totalPositive = data.total_pnl >= 0;

      destroyExistingCharts();
      document.getElementById('cardGrid').innerHTML = '';

      if (!data.frameworks.length) {
        document.getElementById('summaryRow').innerHTML = `
          <div class="stat-pill"><div class="label">Status</div><div class="value">No trades logged yet.</div></div>
        `;
        return;
      }

      const best = data.frameworks[0];
      const worst = data.frameworks[data.frameworks.length-1];
      document.getElementById('summaryRow').innerHTML = `
        <div class="stat-pill">
          <div class="label">Net P&amp;L (account)</div>
          <div class="value ${totalPositive?'pos':'neg'}">${fmt(data.total_pnl)}</div>
        </div>
        <div class="stat-pill">
          <div class="label">Trades Logged</div>
          <div class="value">${data.total_trades}</div>
        </div>
        <div class="stat-pill">
          <div class="label">Best Framework</div>
          <div class="value pos">${best.name}</div>
        </div>
        <div class="stat-pill">
          <div class="label">Weakest Framework</div>
          <div class="value neg">${worst.name}</div>
        </div>
      `;

      const grid = document.getElementById('cardGrid');
      data.frameworks.forEach((fw, i) => {
        const bucket = pnlBucket(fw.net_pnl);
        const ringVar = bucket === 'win' ? 'var(--win)' : bucket === 'loss' ? 'var(--loss)' : 'var(--ink-dim)';
        const pnlClass = bucket==='win'?'pos':bucket==='loss'?'neg':'flat';
        const pf = fw.profit_factor === null ? '∞' : fw.profit_factor;
        const card = document.createElement('div');
        card.className = 'card';
        card.tabIndex = 0;
        card.innerHTML = `
          <div class="card-top">
            <div class="card-id">
              <div class="card-icon">${iconFor(fw.name, i)}</div>
              <div class="card-name-wrap">
                <div class="card-name" title="${fw.name}">${fw.name}</div>
                <div class="card-sub">${fw.trades} trade${fw.trades===1?'':'s'}</div>
              </div>
            </div>
            <div class="badge"><span class="lock">🔒</span>Private</div>
          </div>

          <div class="card-metrics">
            <div class="ring" style="--pct:${fw.win_rate}; --ring-color:${ringVar}">
              <div class="ring-label">${fw.win_rate}%<br>win</div>
            </div>
            <div class="metrics-cols">
              <div class="metric-block">
                <div class="metric-label">Net P&amp;L</div>
                <div class="metric-value ${pnlClass}">${fmt(fw.net_pnl)}</div>
              </div>
            </div>
          </div>

          <div class="spark-wrap"><canvas class="spark" id="spark-${i}"></canvas></div>

          <div class="card-details">
            <div class="details-grid">
              <div>
                <div class="metric-label">Profit factor</div>
                <div class="metric-value">${pf}</div>
              </div>
              <div>
                <div class="metric-label">Win / Loss / BE</div>
                <div class="metric-value">${fw.wins} / ${fw.losses} / ${fw.be}</div>
              </div>
              <div>
                <div class="metric-label">Expectancy</div>
                <div class="metric-value ${fw.expectancy>0?'pos':fw.expectancy<0?'neg':'flat'}">${fmt(fw.expectancy)}</div>
              </div>
              <div>
                <div class="metric-label">Average winner</div>
                <div class="metric-value pos">${fmt(fw.avg_win)}</div>
              </div>
              <div>
                <div class="metric-label">Average loser</div>
                <div class="metric-value neg">${fmt(-fw.avg_loss)}</div>
              </div>
            </div>
          </div>
          <div class="hover-hint">hover for details</div>
        `;
        grid.appendChild(card);
        card.addEventListener('mouseenter', () => { chartState.hoverName = fw.name; applyHoverStyle(); });
        card.addEventListener('mouseleave', () => { chartState.hoverName = null; applyHoverStyle(); });
        card.addEventListener('focusin', () => { chartState.hoverName = fw.name; applyHoverStyle(); });
        card.addEventListener('focusout', () => { chartState.hoverName = null; applyHoverStyle(); });
      });

      data.frameworks.forEach((fw, i)=>{
        const c = document.getElementById('spark-'+i);
        if (c && fw.series.length) sparkline(c, fw.series, pnlColor(fw.net_pnl));
      });

      requestAnimationFrame(() => {
        sparkInstances.forEach(c => c.resize());
      });

      const allDates = [...new Set(data.frameworks.flatMap(f=>f.series.map(p=>p.date)))].sort();
      const datasets = data.frameworks.map((fw,i)=>{
        const map = Object.fromEntries(fw.series.map(p=>[p.date,p.cum]));
        let last = null;
        const vals = [];
        const radii = [];
        allDates.forEach(d=>{
          if (map[d] !== undefined){ last = map[d]; vals.push(map[d]); radii.push(3); }
          else { vals.push(last); radii.push(0); }
        });
        const color = pnlColor(fw.net_pnl);
        return {
          label: fw.name,
          data: vals,
          borderColor: color,
          backgroundColor: color,
          borderWidth: 1.25,
          pointRadius: radii,
          pointHoverRadius: radii.map(r => r ? 5 : 3),
          pointBackgroundColor: color,
          pointBorderColor: color,
          stepped: true,
          spanGaps: true
        };
      });

      frameworksMeta = data.frameworks.map((fw,i)=>({
        name: fw.name,
        color: pnlColor(fw.net_pnl),
        netPnl: fw.net_pnl,
        absPnl: Math.abs(fw.net_pnl),
        datasetIndex: i + 1 // +1 to account for the zero baseline unshifted below
      }));

      const zeroLine = {
        label: '__zero__',
        _isBaseline: true,
        data: allDates.map(()=>0),
        borderColor: '#000',
        borderWidth: 1,
        borderDash: [5,4],
        pointRadius: 0,
        tension: 0,
        stepped: true,
        spanGaps: true,
        order: -1
      };
      datasets.unshift(zeroLine);

      const cc = CHART_COLORS[getTheme()];
      mainChartInstance = new Chart(document.getElementById('mainChart').getContext('2d'), {
        type:'line',
        data:{ labels: allDates, datasets },
        plugins:[lineEndLabelsPlugin],
        options:{
          responsive:true,
          maintainAspectRatio:false,
          layout:{ padding:{ right: 150 } },
          interaction:{mode:'nearest',intersect:false},
          scales:{
            x:{ ticks:{color:cc.tick,font:{family:'ui-monospace',size:10}}, grid:{display:false} },
            y:{ ticks:{color:cc.tick,font:{family:'ui-monospace',size:10},callback:v=>'$'+v}, grid:{display:false}, grace:'8%' }
          },
          plugins:{
            legend:{ display:false },
            tooltip:{
              backgroundColor:cc.tooltipBg,
              borderColor:cc.tooltipBorder,
              borderWidth:1,
              titleFont:{family:'ui-monospace',size:11},
              bodyFont:{family:'ui-monospace',size:11},
              filter: item => item.dataset.label !== '__zero__',
              callbacks:{ label: ctx => ` ${ctx.dataset.label}: $${ctx.parsed.y.toFixed(2)}` }
            }
          }
        }
      });
      chartState.hoverName = null;
      applyVisibility();
    })
    .catch(err=>{
      metaLineEl.textContent = 'sync error: ' + err.message;
      metaLineEl.className = 'meta err';
      console.error(err);
      throw err;
    });
}

const syncBtn = document.getElementById('syncBtn');
const syncIcon = document.getElementById('syncIcon');
const syncLabel = document.getElementById('syncLabel');
function runSync(){
  syncBtn.disabled = true;
  syncIcon.classList.add('spin');
  syncLabel.textContent = 'Syncing…';
  return loadData()
    .then(() => { syncLabel.textContent = 'Synced'; })
    .catch(() => { syncLabel.textContent = 'Retry'; })
    .finally(() => {
      syncIcon.classList.remove('spin');
      syncBtn.disabled = false;
      setTimeout(() => { syncLabel.textContent = 'Sync'; }, 2000);
    });
}
syncBtn.addEventListener('click', runSync);

document.querySelectorAll('#viewModeControl .seg-btn').forEach(btn=>{
  btn.addEventListener('click', () => {
    chartState.viewMode = btn.dataset.mode;
    chartState.soloName = null;
    applyVisibility();
  });
});
document.getElementById('showAllBtn').addEventListener('click', () => {
  chartState.showAll = !chartState.showAll;
  applyVisibility();
});

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', loadData);
} else {
  loadData();
}

const AUTO_REFRESH_MS = 5 * 60 * 1000;
setInterval(() => {
  if (document.visibilityState === 'visible') {
    runSync();
  }
}, AUTO_REFRESH_MS);
</script>
</body>
</html>
